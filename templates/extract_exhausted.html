{% extends "base.html" %}

{% block title %}提取次数已用完 - QRCode-RS{% endblock %}
{% block body_class %}body-extract{% endblock %}

{% block content %}
<div class="extract-card fade-in">
    <div class="extract-header">
        <div class="extract-icon error">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>
        <h1 style="color: var(--danger);">提取次数已用完</h1>
    </div>

    <div class="extract-empty">
        <p>该二维码已无剩余提取次数</p>
        <p class="extract-contact">如需刷新次数，请联系管理员</p>
    </div>
</div>
{% endblock %}
