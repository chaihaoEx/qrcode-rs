{% extends "base.html" %}

{% block title %}创建二维码 - QRCode-RS{% endblock %}

{% block container_class %}container-wide{% endblock %}

{% block content %}
<div class="admin-box">
    <div class="header">
        <h1>创建二维码</h1>
        <div class="header-actions">
            <a href="{{ base }}/" class="btn btn-sm">返回列表</a>
        </div>
    </div>

    <form method="POST" action="{{ base }}/create" class="create-form">
        <div class="form-group">
            <label for="text_content">文字内容 <span class="required">*</span></label>
            <textarea id="text_content" name="text_content" rows="4" required placeholder="输入二维码包含的文字内容"></textarea>
        </div>
        <div class="form-group">
            <label for="remark">备注</label>
            <input type="text" id="remark" name="remark" placeholder="选填，方便后续查找">
        </div>
        <div class="form-group">
            <label for="max_count">最大提取次数</label>
            <input type="number" id="max_count" name="max_count" value="5" min="1">
        </div>
        <button type="submit" class="btn btn-primary">创建</button>
    </form>
</div>
{% endblock %}
