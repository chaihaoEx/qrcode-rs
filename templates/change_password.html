{% extends "base.html" %}

{% block title %}修改密码 - QRCode-RS{% endblock %}
{% block body_class %}body-admin{% endblock %}
{% block layout_class %}page-admin{% endblock %}

{% block content %}
{% include "nav.html" %}

<main class="admin-main fade-in">
    <div class="admin-header">
        <h1>修改密码</h1>
    </div>

    <div class="admin-card">
        <form method="POST" action="{{ base }}/change-password" class="form-create">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="field">
                <label for="old_password">当前密码 <span class="required">*</span></label>
                <input type="password" id="old_password" name="old_password" required placeholder="请输入当前密码" autocomplete="current-password">
            </div>
            <div class="field">
                <label for="new_password">新密码 <span class="required">*</span></label>
                <input type="password" id="new_password" name="new_password" required placeholder="至少 8 个字符" minlength="8" maxlength="200" autocomplete="new-password">
            </div>
            <div class="form-actions">
                <a href="{{ base }}/" class="btn">取消</a>
                <button type="submit" class="btn btn-primary" onclick="return confirm('修改密码后需要重新登录，确定继续吗？')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    修改密码
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
