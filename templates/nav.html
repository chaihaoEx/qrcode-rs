<!-- 手机端顶栏 -->
<div class="mobile-header">
    <button class="hamburger" id="menuToggle" aria-label="菜单">
        <span></span><span></span><span></span>
    </button>
    <span class="mobile-brand">QRCode-RS</span>
    <span class="mobile-user">{{ username }}</span>
</div>

<!-- 遮罩层 -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="17"/><line x1="14" y1="21" x2="17" y2="21"/>
        </svg>
        <span>QRCode-RS</span>
    </div>

    <nav class="sidebar-nav">
        <a href="{{ base }}/" class="sidebar-item {% if active_nav == 'qrcode' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/></svg>
            <span>二维码管理</span>
        </a>
        {% if role == "super" %}
        <a href="{{ base }}/audit-logs" class="sidebar-item {% if active_nav == 'audit' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>操作日志</span>
        </a>
        {% endif %}
        {% if ai_enabled %}
        <a href="{{ base }}/ai-generate" class="sidebar-item {% if active_nav == 'ai' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4c0 1.95-2 3-2 8h-4c0-5-2-6.05-2-8a4 4 0 014-4z"/><line x1="10" y1="22" x2="14" y2="22"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
            <span>AI 生成</span>
        </a>
        {% endif %}
        {% if role == "super" %}
        <a href="{{ base }}/users" class="sidebar-item {% if active_nav == 'users' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span>用户管理</span>
        </a>
        {% endif %}
        {% if role == "admin" %}
        <a href="{{ base }}/change-password" class="sidebar-item {% if active_nav == 'password' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <span>修改密码</span>
        </a>
        {% endif %}
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-user-info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>{{ username }}</span>
        </div>
        <a href="{{ base }}/logout" class="sidebar-logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>退出登录</span>
        </a>
    </div>
</aside>

<script>
(function() {
    var toggle = document.getElementById('menuToggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebarOverlay');
    function open() {
        sidebar.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function close() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
    }
    toggle.addEventListener('click', function() {
        sidebar.classList.contains('open') ? close() : open();
    });
    overlay.addEventListener('click', close);
    var items = sidebar.querySelectorAll('.sidebar-item');
    for (var i = 0; i < items.length; i++) {
        items[i].addEventListener('click', function() {
            if (window.innerWidth <= 768) close();
        });
    }
})();
</script>
