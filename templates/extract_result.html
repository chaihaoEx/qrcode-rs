{% extends "base.html" %}

{% block title %}提取成功 - QRCode-RS{% endblock %}
{% block body_class %}body-extract{% endblock %}

{% block content %}
<div class="extract-card fade-in">
    <div class="extract-header extract-header-success">
        <div class="extract-icon success">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        </div>
        <h1>提取成功</h1>
    </div>

    <div class="result-content">
        <p class="result-text" id="resultText">{{ text_content }}</p>
    </div>

    <button class="btn btn-primary btn-copy" id="copyBtn" onclick="(function(){var t=document.getElementById('resultText').innerText;navigator.clipboard.writeText(t).then(function(){var b=document.getElementById('copyBtn');b.textContent='已复制';b.classList.add('btn-copied');setTimeout(function(){b.innerHTML='<svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><rect x=&quot;9&quot; y=&quot;9&quot; width=&quot;13&quot; height=&quot;13&quot; rx=&quot;2&quot; ry=&quot;2&quot;/><path d=&quot;M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1&quot;/></svg> 复制内容';b.classList.remove('btn-copied');},1500)})})()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        复制内容
    </button>

    <div class="extract-meta">
        <div class="meta-row">
            <span class="meta-label">剩余提取次数</span>
            <span class="meta-value">
                <span class="remaining-badge {% if remaining == 0 %}remaining-zero{% endif %}">{{ remaining }}</span>
            </span>
        </div>
    </div>
</div>
{% endblock %}
