name: Rust

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl
    - uses: Swatinem/rust-cache@v2
    - name: Install musl tools
      run: sudo apt-get install -y musl-tools
    - name: Build
      run: cargo build --release --target x86_64-unknown-linux-musl --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Package artifact
      run: |
        mkdir -p artifact
        cp target/x86_64-unknown-linux-musl/release/qrcode-rs artifact/
        cp -r templates artifact/
        cp -r static artifact/
        cp -r sql artifact/
        cp config.example.toml artifact/
    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: qrcode-rs-linux-x86_64
        path: artifact/
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v5
      with:
        name: qrcode-rs-linux-x86_64
        path: qrcode-rs-linux-x86_64
    - name: Archive
      run: tar czf qrcode-rs-linux-x86_64.tar.gz -C qrcode-rs-linux-x86_64 .
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: qrcode-rs-linux-x86_64.tar.gz
