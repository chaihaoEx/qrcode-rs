[server]
host = "127.0.0.1"
port = 8080
# 用于签名 session cookie 的密钥，至少 64 字符
secret_key = "CHANGE_ME_generate_a_random_string_at_least_64_characters_long_using_openssl_rand"
# 虚拟目录前缀，为空则不加前缀，例如 "/qrcode"
context_path = ""
# 二维码扫描后访问的主机名
public_host = "http://127.0.0.1:8080"
# 二维码提取链接的 HMAC 校验盐值
extract_salt = "CHANGE_ME_use_a_unique_random_salt_value"
# 是否兼容旧版 8 字符 HMAC 哈希（默认 true，迁移完成后可设为 false）
# legacy_hash_support = true
# HTTPS 配置（可选，不配置则仅使用 HTTP）
# https_port = 8443
# tls_cert = "/path/to/cert.pem"
# tls_key = "/path/to/key.pem"

[admin]
username = "admin"
# 使用 `cargo run -- hash-password your_password` 生成
password_hash = "CHANGE_ME_run_cargo_run_hash_password_to_generate"

[database]
url = "mysql://CHANGE_USER:CHANGE_PASSWORD@localhost:3306/qrcode_db"
# 数据库连接池最大连接数（默认 10）
# max_connections = 10
# 数据库会话时区（默认 +08:00）
# timezone = "+08:00"

# AI 评论生成（可选，不配置则隐藏 AI 功能入口）
# [ai]
# base_url = "https://api.deepseek.com/v1"
# api_key = "sk-xxx"
# model = "deepseek-chat"
